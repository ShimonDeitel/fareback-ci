name: Fareback
options:
  bundleIdPrefix: com.shimondeitel.fareback
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Fareback:
    type: application
    platform: iOS
    sources:
      - path: Fareback
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fareback
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Fareback/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FarebackTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FarebackTests
      - path: Fareback.storekit
    dependencies:
      - target: Fareback
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fareback.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FarebackUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FarebackUITests
    dependencies:
      - target: Fareback
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fareback.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Fareback:
    build:
      targets:
        Fareback: all
        FarebackTests: [test]
        FarebackUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Fareback.storekit
    test:
      config: Debug
      storeKitConfiguration: Fareback.storekit
      targets:
        - FarebackTests
        - FarebackUITests
    archive:
      config: Release
